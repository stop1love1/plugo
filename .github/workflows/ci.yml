name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check backend/

      - name: Ruff format check
        run: ruff format --check backend/

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: backend-lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check syntax errors
        run: |
          cd backend
          python -m py_compile main.py
          python -m py_compile config.py

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: |
          cd dashboard
          npm ci || npm install

      - name: Lint
        run: |
          cd dashboard
          npm run lint

      - name: Format check
        run: |
          cd dashboard
          npm run format:check

      - name: Test
        run: |
          cd dashboard
          npm run test

      - name: Build
        run: |
          cd dashboard
          npm run build

  widget:
    name: Widget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: widget/package-lock.json

      - name: Install dependencies
        run: |
          cd widget
          npm ci || npm install

      - name: Lint
        run: |
          cd widget
          npm run lint

      - name: Format check
        run: |
          cd widget
          npm run format:check

      - name: Test
        run: |
          cd widget
          npm run test

      - name: Build
        run: |
          cd widget
          npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-build, dashboard, widget]
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker Compose config
        run: docker compose config --quiet
