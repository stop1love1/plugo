name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check backend/

      - name: Ruff format check
        run: ruff format --check backend/

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: backend-lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check syntax errors
        run: |
          cd backend
          python -m py_compile main.py
          python -m py_compile config.py

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Lint
        run: cd frontend && pnpm lint

      - name: Format check
        run: cd frontend && pnpm format:check

      - name: Test
        run: cd frontend && pnpm test

      - name: Build
        run: cd frontend && pnpm build

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Bandit (Python SAST)
        run: bandit -r backend/ -ll -ii --exclude backend/tests -f json -o bandit-report.json

      - name: Bandit summary
        run: bandit -r backend/ -ll -ii --exclude backend/tests

      - name: pip-audit (dependency CVEs)
        run: pip-audit -r backend/requirements.txt

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Frontend dependency audit
        run: cd frontend && pnpm install --frozen-lockfile && pnpm audit

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-build, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker Compose config
        run: docker compose config --quiet
