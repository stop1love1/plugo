version: "3.8"

# ============================================
# Plugo — Run everything with one command:
#   docker compose up --build
#
# Services:
#   - backend:   FastAPI (port 8000)
#   - dashboard: React/Vite (port 3000)
#   - widget:    Build widget.js → shared volume
#   - mongodb:   MongoDB 7 (port 27017)
# ============================================

services:

  # --- MongoDB ---
  mongodb:
    image: mongo:7
    container_name: plugo-mongodb
    # Port is NOT exposed to the host by default — other services reach Mongo
    # on the compose network at `mongodb:27017`. Uncomment for local debugging
    # only; exposing 27017 on a production host is a common data-exfil vector.
    # ports:
    #   - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-plugo}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-plugo_dev_password}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_USER:-plugo}", "-p", "${MONGO_PASSWORD:-plugo_dev_password}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Widget Builder ---
  # Builds widget.js and copies it to a shared volume for the backend to serve
  widget:
    build:
      context: ./frontend
      dockerfile: Dockerfile.widget
    container_name: plugo-widget
    volumes:
      - widget_dist:/app/widget-dist

  # --- Backend (FastAPI) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plugo-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_data:/app/data
      - widget_dist:/app/static_widget    # Widget JS from builder
    env_file:
      - .env
    environment:
      - DATABASE_PROVIDER=${DATABASE_PROVIDER:-mongodb}
      - MONGODB_URL=mongodb://${MONGO_USER:-plugo}:${MONGO_PASSWORD:-plugo_dev_password}@mongodb:27017
      - MONGODB_DATABASE=plugo
    depends_on:
      mongodb:
        condition: service_healthy
      widget:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # --- Dashboard (React + Vite) ---
  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: plugo-dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); http.get('http://localhost:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  mongo_data:
  backend_data:
  widget_dist:
